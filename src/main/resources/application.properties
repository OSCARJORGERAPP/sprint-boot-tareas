spring.application.name=tareas-api

# Base de datos SQL (H2 embebida; intercambiable por MySQL/PostgreSQL cambiando estas propiedades)
spring.datasource.url=jdbc:h2:mem:tareasdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Consola web de H2 (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
