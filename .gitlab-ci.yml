# Pipeline según el patrón probado en lottery/ecommerce (ver AGENTS.md §CI de
# esos proyectos): el único runner operativo tiene tag `cloudrun` y executor
# shell (ignora `image:`), así que jobs con imagen Maven se quedan en pending.
# Los tests se ejecutan DENTRO del build del Dockerfile (stage de Maven corre
# `mvn test package`): si un test falla, buildah falla y el pipeline queda rojo.
include:
  - project: 'internos/templates-cicd'
    ref: main
    file:
      - 'templates/build-deploy.yml'

# Solo el job `build` es compatible con la infraestructura actual; el resto se
# desactiva por completo (con allow_failure quedaría "passed with warnings" en
# lugar de verde limpio).
wake_cloudrun_runners:
  rules:
    - when: never

deploy:
  rules:
    - when: never
